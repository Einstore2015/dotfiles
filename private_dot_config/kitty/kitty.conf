# Font Configuration
font_size 12.0

# Window Configuration
window_padding_width 12
background_opacity 0.8
background_blur 32
hide_window_decorations yes

# Cursor Configuration
cursor_shape block
cursor_blink_interval 1

# Scrollback
scrollback_lines 3000

# Terminal features
copy_on_select yes
strip_trailing_spaces smart

# Key bindings for common actions
map ctrl+shift+n new_window
map ctrl+t new_tab
map ctrl+plus change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0
# 使用 PageUp/PageDown 直接滚动
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down
# 小键盘kp_page_up/down
map shift+kp_page_up scroll_page_up
map shift+kp_page_down scroll_page_down

# Tab configuration
tab_bar_edge top
tab_bar_style powerline
tab_bar_align left

# Shell integration
shell_integration enabled

# Dank color generation
include dank-tabs.conf
include dank-theme.conf


# BEGIN_KITTY_FONTS
font_family      family='Maple Mono Normal NF CN' style=Bold
bold_font        family='Maple Mono Normal NF CN' style=ExtraBold
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
